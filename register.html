<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inscription — Privency</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: #141414;
    color: #f0ede6;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .register-card {
    width: 100%;
    max-width: 420px;
  }

  .brand {
    text-align: center;
    margin-bottom: 40px;
  }

  .brand h1 {
    font-size: 28px;
    font-weight: 600;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #f0ede6;
  }

  .brand h1 span {
    color: #b8923a;
  }

  .brand p {
    margin-top: 8px;
    font-size: 14px;
    color: #8a857c;
    font-weight: 300;
  }

  .form-box {
    background: #1c1c1c;
    border: 1px solid #2a2a2a;
    border-radius: 12px;
    padding: 36px 32px;
  }

  .form-box h2 {
    font-size: 18px;
    font-weight: 500;
    margin-bottom: 28px;
    text-align: center;
  }

  .field-row {
    display: flex;
    gap: 14px;
  }

  .field-row .field {
    flex: 1;
  }

  .field {
    margin-bottom: 20px;
  }

  .field label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    color: #b3aea4;
    margin-bottom: 8px;
    letter-spacing: 0.3px;
  }

  .field input {
    width: 100%;
    padding: 13px 14px;
    background: #141414;
    border: 1px solid #333;
    border-radius: 8px;
    color: #f0ede6;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    transition: border-color 0.2s ease;
  }

  .field input:focus {
    outline: none;
    border-color: #b8923a;
  }

  .field input::placeholder {
    color: #5c574e;
  }

  .btn-submit {
    width: 100%;
    padding: 14px;
    margin-top: 8px;
    background: #b8923a;
    color: #141414;
    border: none;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: background 0.2s ease, opacity 0.2s ease;
  }

  .btn-submit:hover {
    background: #c9a14a;
  }

  .btn-submit:disabled {
    opacity: 0.6;
    cursor: not-allowed;
  }

  .error-message {
    display: none;
    margin-top: 16px;
    padding: 12px 14px;
    background: rgba(192, 57, 43, 0.12);
    border: 1px solid rgba(192, 57, 43, 0.4);
    border-radius: 8px;
    color: #e07b6e;
    font-size: 14px;
    line-height: 1.4;
  }

  .error-message.visible {
    display: block;
  }

  .success-message {
    display: none;
    margin-top: 16px;
    padding: 12px 14px;
    background: rgba(184, 146, 58, 0.12);
    border: 1px solid rgba(184, 146, 58, 0.4);
    border-radius: 8px;
    color: #b8923a;
    font-size: 14px;
    line-height: 1.4;
  }

  .success-message.visible {
    display: block;
  }

  .login-link {
    margin-top: 24px;
    text-align: center;
    font-size: 14px;
    color: #8a857c;
  }

  .login-link a {
    color: #b8923a;
    text-decoration: none;
    font-weight: 500;
  }

  .login-link a:hover {
    text-decoration: underline;
  }
</style>
</head>
<body>

<div class="register-card">
  <div class="brand">
    <h1>Priven<span>cy</span></h1>
    <p>Votre espace immobilier professionnel</p>
  </div>

  <div class="form-box">
    <h2>Créer un compte</h2>
    <form id="register-form" novalidate>
      <div class="field-row">
        <div class="field">
          <label for="prenom">Prénom</label>
          <input type="text" id="prenom" name="prenom" placeholder="Jean" autocomplete="given-name" required>
        </div>
        <div class="field">
          <label for="nom">Nom</label>
          <input type="text" id="nom" name="nom" placeholder="Dupont" autocomplete="family-name" required>
        </div>
      </div>
      <div class="field">
        <label for="email">Adresse email</label>
        <input type="email" id="email" name="email" placeholder="vous@exemple.fr" autocomplete="email" required>
      </div>
      <div class="field">
        <label for="password">Mot de passe</label>
        <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="new-password" required>
      </div>
      <button type="submit" class="btn-submit" id="submit-btn">Créer mon compte</button>
      <div class="error-message" id="error-message"></div>
      <div class="success-message" id="success-message"></div>
    </form>
    <p class="login-link">Déjà un compte ? <a href="/login.html">Se connecter</a></p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL = 'https://hhqcumnatnslfjpsrmgb.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_Asv3-Q2Q9XSA_gvV1nB74Q_0N6prN2E';

  const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  const form = document.getElementById('register-form');
  const submitBtn = document.getElementById('submit-btn');
  const errorMessage = document.getElementById('error-message');
  const successMessage = document.getElementById('success-message');

  function translateError(message) {
    const translations = {
      'User already registered': 'Un compte existe déjà avec cette adresse email.',
      'Password should be at least 6 characters.': 'Le mot de passe doit contenir au moins 6 caractères.',
      'Unable to validate email address: invalid format': 'L\'adresse email est invalide.',
      'Signup requires a valid password': 'Veuillez saisir un mot de passe valide.'
    };
    return translations[message] || message;
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();

    const prenom = document.getElementById('prenom').value.trim();
    const nom = document.getElementById('nom').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    errorMessage.classList.remove('visible');
    errorMessage.textContent = '';
    successMessage.classList.remove('visible');
    successMessage.textContent = '';

    if (!prenom || !nom || !email || !password) {
      errorMessage.textContent = 'Veuillez remplir tous les champs.';
      errorMessage.classList.add('visible');
      return;
    }

    submitBtn.disabled = true;
    submitBtn.textContent = 'Création…';

    const { error } = await client.auth.signUp({
      email,
      password,
      options: { data: { prenom, nom } }
    });

    if (error) {
      errorMessage.textContent = translateError(error.message);
      errorMessage.classList.add('visible');
      submitBtn.disabled = false;
      submitBtn.textContent = 'Créer mon compte';
      return;
    }

    form.reset();
    successMessage.textContent = 'Vérifiez votre email pour confirmer votre compte.';
    successMessage.classList.add('visible');
    submitBtn.disabled = false;
    submitBtn.textContent = 'Créer mon compte';
  });
</script>

</body>
</html>
