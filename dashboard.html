<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style id="auth-guard-hide">body { display: none !important; }</style>
<title>Tableau de bord — Privency</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: #141414;
    color: #f0ede6;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 28px;
    border-bottom: 1px solid #2a2a2a;
  }

  .logo {
    font-size: 20px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #f0ede6;
  }

  .logo span {
    color: #b8923a;
  }

  .btn-logout {
    background: #141414;
    color: #b8923a;
    border: 1px solid #b8923a;
    border-radius: 6px;
    padding: 7px 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.2s ease, color 0.2s ease;
  }

  .btn-logout:hover {
    background: #b8923a;
    color: #141414;
  }

  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
  }

  .welcome {
    text-align: center;
    margin-bottom: 36px;
  }

  .welcome h1 {
    font-size: 26px;
    font-weight: 500;
  }

  .welcome h1 span {
    color: #b8923a;
  }

  .welcome p {
    margin-top: 8px;
    font-size: 14px;
    color: #8a857c;
    font-weight: 300;
  }

  .card {
    width: 100%;
    max-width: 460px;
    background: #1c1c1c;
    border: 1px solid #2a2a2a;
    border-radius: 12px;
    padding: 36px 32px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .btn-primary {
    display: block;
    width: 100%;
    padding: 15px;
    background: #b8923a;
    color: #141414;
    border: none;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-align: center;
    text-decoration: none;
    cursor: pointer;
    transition: background 0.2s ease, opacity 0.2s ease;
  }

  .btn-primary:hover {
    background: #c9a14a;
  }

  .btn-secondary {
    display: block;
    width: 100%;
    padding: 15px;
    background: transparent;
    color: #b8923a;
    border: 1px solid #b8923a;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-align: center;
    cursor: pointer;
    transition: background 0.2s ease, color 0.2s ease, opacity 0.2s ease;
  }

  .btn-secondary:hover {
    background: rgba(184, 146, 58, 0.12);
  }

  .btn-secondary:disabled {
    opacity: 0.6;
    cursor: not-allowed;
  }

  .error-message {
    display: none;
    padding: 12px 14px;
    background: rgba(192, 57, 43, 0.12);
    border: 1px solid rgba(192, 57, 43, 0.4);
    border-radius: 8px;
    color: #e07b6e;
    font-size: 14px;
    line-height: 1.4;
  }

  .error-message.visible {
    display: block;
  }
</style>
<!-- ══════════ AUTH GUARD (Supabase) ══════════ -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function () {
  const AUTH_SUPABASE_URL = 'https://hhqcumnatnslfjpsrmgb.supabase.co';
  const AUTH_SUPABASE_KEY = 'sb_publishable_Asv3-Q2Q9XSA_gvV1nB74Q_0N6prN2E';

  const authClient = supabase.createClient(AUTH_SUPABASE_URL, AUTH_SUPABASE_KEY);
  window.privencyAuth = authClient;
  window.privencySession = null;

  // resolved : une seule décision (révéler ou rediriger), quel que soit le
  // premier signal arrivé (onAuthStateChange, getSession ou timeout).
  let resolved = false;

  function reveal(session) {
    if (resolved) return;
    resolved = true;
    window.privencySession = session;
    // Une règle !important en feuille de style ne peut pas être surpassée
    // par un style inline : on supprime la balise <style> du voile.
    const apply = () => {
      const hide = document.getElementById('auth-guard-hide');
      if (hide) hide.remove();
      if (document.body) document.body.style.display = 'flex';
      document.dispatchEvent(new CustomEvent('privency:session', { detail: session }));
    };
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', apply);
    } else {
      apply();
    }
  }

  function denied() {
    if (resolved) return;
    resolved = true;
    window.location.replace('/login.html');
  }

  // Signal principal : onAuthStateChange émet INITIAL_SESSION au chargement
  // une fois la session restaurée (ou confirmée absente) depuis le storage.
  authClient.auth.onAuthStateChange((event, session) => {
    if (session) {
      reveal(session);
    } else {
      denied();
    }
  });

  // Fallback : getSession() en parallèle, et couperet à 3 secondes si
  // aucun des deux signaux n'a confirmé de session d'ici là.
  authClient.auth.getSession().then(({ data: { session } }) => {
    if (session) {
      reveal(session);
    } else {
      denied();
    }
  }).catch(denied);

  setTimeout(() => { denied(); }, 3000);
})();
</script>
</head>
<body>

<header>
  <div class="logo">Priven<span>cy</span></div>
  <button type="button" class="btn-logout" id="logout-btn">Déconnexion</button>
</header>

<main>
  <div class="welcome">
    <h1>Bienvenue, <span id="user-name">…</span></h1>
    <p>Votre espace immobilier professionnel</p>
  </div>

  <div class="card">
    <a href="/app.html" class="btn-primary">Accéder au générateur</a>
    <button type="button" class="btn-secondary" id="subscribe-btn">Activer mon abonnement</button>
    <div class="error-message" id="error-message"></div>
  </div>
</main>

<script>
(function () {
  const subscribeBtn = document.getElementById('subscribe-btn');
  const errorMessage = document.getElementById('error-message');

  function showUser(session) {
    const meta = (session && session.user && session.user.user_metadata) || {};
    const fullName = [meta.prenom, meta.nom].filter(Boolean).join(' ');
    document.getElementById('user-name').textContent = fullName || (session && session.user && session.user.email) || '';
  }

  if (window.privencySession) {
    showUser(window.privencySession);
  } else {
    document.addEventListener('privency:session', (e) => showUser(e.detail));
  }

  subscribeBtn.addEventListener('click', async () => {
    const session = window.privencySession;
    if (!session) return;

    errorMessage.classList.remove('visible');
    errorMessage.textContent = '';
    subscribeBtn.disabled = true;
    subscribeBtn.textContent = 'Redirection vers le paiement…';

    try {
      const response = await fetch('/api/create-checkout', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          user_id: session.user.id,
          email: session.user.email
        })
      });

      const data = await response.json();

      if (!response.ok || !data.url) {
        throw new Error(data.error || 'Impossible de créer la session de paiement.');
      }

      window.location.href = data.url;
    } catch (err) {
      errorMessage.textContent = err.message || 'Une erreur est survenue. Veuillez réessayer.';
      errorMessage.classList.add('visible');
      subscribeBtn.disabled = false;
      subscribeBtn.textContent = 'Activer mon abonnement';
    }
  });

  document.getElementById('logout-btn').addEventListener('click', async () => {
    await window.privencyAuth.auth.signOut();
    window.location.replace('/login.html');
  });
})();
</script>

</body>
</html>
